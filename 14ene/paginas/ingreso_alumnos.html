<!doctype html>
<html>
<head>
<meta charset="utf-8">

<title>Formulario Base de Datos</title>
<link rel="stylesheet" href="../estilos/estilos.css">
</head>

<body>
<nav class="menu"><a href="index.html">INICIO</a></nav>
<div class="contenedor">
  <h1>FORMULARIO DATOS ALUMNO
    
  </h1>
  <form id="form1" name="form1" method="post" action="../server/insercion.php">
    <fieldset>
      <legend>Datos Personales</legend>
      <p>
        <label for="textfield">Apellidos:</label>
        <input type="text" name="apellidos" id="apellidos" autofocus pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{2,}"
         title="Solo letras" onchange="validar_letras(this)">
      </p>
      <p>
        <label for="textfield2">Nombres:</label>
        <input type="text" name="nombres" id="nombres" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{2,}" title="Solo letras" onChange="validar_letras(this)">
      </p>
      <p>
        <label for="textfield3">Cedula:</label>
        <input type="text" name="cedula" id="cedula" maxlength="10" pattern="[0-9]{10}" title="Debe contener 10 dígitos" onChange="validar_cedula()">
      </p>
      <p>
        <label for="textfield4">Email:</label>
        <input type="email" name="email" id="email" onChange="validar_email()">
      </p>
      
    </fieldset>
	<p>
	  <input type="submit" name="submit" id="submit" value="Enviar">
	</p>
	<p>
	  <input type="reset" name="reset" id="reset" value="Restablecer">
	</p> 
	 
  </form>
</div>
<script src="../script/validacion.js" type="text/javascript"></script>
</body>
</html>
