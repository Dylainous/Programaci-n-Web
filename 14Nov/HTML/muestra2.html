<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Muestra 2</title>
</head>
<body>

<h2>Muestra 2</h2>

<form action="muestra3.html" method="GET">

<script>
const params = new URLSearchParams(window.location.search);
for (const [key, value] of params.entries()) {
    document.write('<input type="hidden" name="' + key + '" value="' + value + '">');
}
</script>

<p>
    <label>Hora de la muestra:</label>
    <input type="time" name="hora2" required>
</p>

<p>
    <label>Temperatura:</label>
    <input type="text" name="temp2" required>
</p>

<p>
    <label>Presión arterial:</label>
    <input type="text" name="presion2" required>
</p>

<p>
    <label>Pulso:</label>
    <input type="text" name="pulso2" required>
</p>

<input type="submit" value="Siguiente →">

</form>

</body>
</html>
