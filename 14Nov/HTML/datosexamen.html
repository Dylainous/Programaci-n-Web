<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Datos Examen</title>
</head>
<body>

<h2>Datos del Examen</h2>

<form action="muestra1.html" method="GET">
	
<script>
const params = new URLSearchParams(window.location.search);
for (const [key, value] of params.entries()) {
    document.write('<input type="hidden" name="' + key + '" value="' + value + '">');
}
</script>

<p>
    <label>Fecha del Examen:</label>
    <input type="date" name="fecha_examen" required>
</p>

<p>Alergias:
    <label><input type="radio" name="alergias" value="Si"> Si</label>
    <label><input type="radio" name="alergias" value="No"> No</label>
</p>

<p>
    <label>Descripción alergia:</label>
    <input type="text" name="desc_alergia">
</p>

<p>¿Toma medicamentos?
    <label><input type="radio" name="medicamentos" value="Si"> Si</label>
    <label><input type="radio" name="medicamentos" value="No"> No</label>
</p>

<p>
    <label>Descripción medicamento:</label>
    <input type="text" name="desc_med">
</p>

<p>
    <label>Observaciones:</label>
    <input type="text" name="observaciones">
</p>

<input type="submit" value="Siguiente →">

</form>

</body>
</html>
