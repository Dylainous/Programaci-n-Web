<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Formulario Muestras</title>
</head>

<body>
<div class="contenedor" style="width: 90%; margin: auto">

  <table>
    <tr>
      <td width="50%">
        
        <fieldset>
          <legend>Datos Personales</legend>

          <p>
            <label>Nombres y Apellidos:</label>
            <input type="text">
          </p>
          <p>
            <label>Cédula:</label>
            <input type="text">
          </p>
          <p>
            <label>Email:</label>
            <input type="email">
          </p>
          <p>
            <label>Fecha Nacimiento:</label>
            <input type="date">
          </p>
          <p>
            <label>Dirección:</label>
            <input type="text">
          </p>
          <p>
            <label>Género:</label>
            <select></select>
          </p>
          <p>
            <label>Tipo de Sangre:</label>
            <select></select>
          </p>
        </fieldset>


        <fieldset>
          <legend>Datos Examen</legend>

          <p>
            <label>Fecha del Examen:</label>
            <input type="date">
          </p>

          <p>Alergias:
            <label><input type="radio" name="Alergias" value="Si"> Sí</label>
            <label><input type="radio" name="Alergias" value="No"> No</label>
          </p>

          <p>
            <label>Descripción Alergia:</label>
            <input type="text">
          </p>

          <p>¿Toma medicamentos?
            <label><input type="radio" name="Medicamentos" value="Si"> Sí</label>
            <label><input type="radio" name="Medicamentos" value="No"> No</label>
          </p>

          <p>
            <label>Descripción del medicamento:</label>
            <input type="text">
          </p>

          <p>
            <label>Observaciones:</label>
            <input type="text">
          </p>

        </fieldset>

      </td>


  
      <td width="50%">

    
        <fieldset>
          <legend>Muestra #1</legend>

          <p>
            <label>Hora de la muestra:</label>
            <input type="time">
          </p>
          <p>
            <label>Temperatura:</label>
            <input type="text">
          </p>
          <p>
            <label>Presión arterial:</label>
            <input type="text">
          </p>
          <p>
            <label>Pulso:</label>
            <input type="text">
          </p>
        </fieldset>

     
        <fieldset>
          <legend>Muestra #2</legend>

          <p>
            <label>Hora de la muestra:</label>
            <input type="time">
          </p>
          <p>
            <label>Temperatura:</label>
            <input type="text">
          </p>
          <p>
            <label>Presión arterial:</label>
            <input type="text">
          </p>
          <p>
            <label>Pulso:</label>
            <input type="text">
          </p>
        </fieldset>


        <fieldset>
          <legend>Muestra #3</legend>

          <p>
            <label>Hora de la muestra:</label>
            <input type="time">
          </p>
          <p>
            <label>Temperatura:</label>
            <input type="text">
          </p>
          <p>
            <label>Presión arterial:</label>
            <input type="text">
          </p>
          <p>
            <label>Pulso:</label>
            <input type="text">
          </p>
        </fieldset>

        <p>
          <input type="submit" value="Enviar">
        </p>

      </td>
    </tr>
  </table>

</div>
</body>
</html>
